<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bienvenido Socio | DAM</title>

  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

  <style>
    .platinum-text {
      background: linear-gradient(120deg,#e5e5e5,#ffffff,#cfcfcf,#ffffff,#bfbfbf);
      background-size: 200% auto;
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      animation: shinePlatinum 3s linear infinite;
    }

    @keyframes shinePlatinum {
      0% { background-position: 0% center; }
      100% { background-position: 200% center; }
    }
  </style>
</head>

<body class="bg-gray-900 flex items-center justify-center min-h-screen font-[Poppins]">

<!-- Fondo -->
<div class="absolute inset-0 bg-[url('landing.png')] bg-cover bg-center blur-2xl opacity-30"></div>

<div class="relative z-10 w-full max-w-lg p-6">
    
<button onclick="irASocios()" class="absolute -top-4 -right-4 bg-[#D4AF37] text-white w-10 h-10 rounded-full flex items-center justify-center font-bold shadow-2xl hover:bg-white hover:text-[#D4AF37] transition">
  X
</button>

<div class="bg-white/10 backdrop-blur-md p-6 rounded-3xl border border-white/20 shadow-2xl text-center">
        
<img src="landing.png" class="w-full rounded-2xl shadow-lg">

<div class="mt-6">
<h1 class="text-white text-2xl font-bold tracking-widest">
  BIENVENIDO SOCIO
</h1>

<p id="loading-text" class="text-gray-300 mt-2 text-sm uppercase tracking-wider font-medium">
  Preparando tu panel exclusivo<span id="dots"></span>
</p>

<div class="w-full bg-white/10 rounded-full h-1.5 mt-4 overflow-hidden">
  <div id="progress-bar" class="h-full bg-[#D4AF37] w-0 transition-all duration-300"></div>
</div>

<!-- SELECCIÓN -->
<div id="validacion" class="mt-6 opacity-0 scale-90 transition-all duration-500">

<p class="text-white text-sm tracking-widest font-semibold mb-4">
  SELECCIONA TU MEMBRESÍA
</p>

<div class="flex flex-col gap-3">

<button onclick="seleccionarMembresia(event,'basic')" 
class="membresia-btn border border-blue-400 text-blue-400 py-2 rounded-full hover:bg-blue-400/10">
  BASIC
</button>

<button onclick="seleccionarMembresia(event,'gold')" 
class="membresia-btn border border-yellow-400 text-yellow-400 py-2 rounded-full hover:bg-yellow-400/10">
  GOLD
</button>

<button onclick="seleccionarMembresia(event,'platinum')" 
class="membresia-btn border border-gray-300 text-gray-300 py-2 rounded-full hover:bg-gray-300/10">
  PLATINUM
</button>

</div>

<!-- MENSAJE -->
<p id="mensaje" class="mt-4 text-sm hidden"></p>

</div>

<!-- BOTÓN -->
<button id="btnEntrar" 
class="mt-8 bg-[#D4AF37] text-white px-8 py-3 rounded-full font-bold hover:scale-105 transition opacity-50 cursor-not-allowed">
  CONTINUAR AL PORTAFOLIO
</button>

</div>
</div>
</div>

<script>
function irASocios() {
  window.location.href = 'socios.html';
}

// PUNTOS
let dots = "";
setInterval(() => {
  dots = dots.length < 3 ? dots + "." : "";
  document.getElementById("dots").textContent = dots;
}, 500);

// PROGRESO
let progress = 0;
const bar = document.getElementById("progress-bar");
const texto = document.getElementById("loading-text");
const validacion = document.getElementById("validacion");

const interval = setInterval(() => {
  progress += Math.random() * 12;

  if (progress >= 100) {
    progress = 100;
    clearInterval(interval);

    texto.innerHTML = "Verificando acceso seguro...";

    setTimeout(() => {
      validacion.classList.remove("opacity-0","scale-90");
      validacion.classList.add("opacity-100","scale-100");
    }, 600);
  }

  bar.style.width = progress + "%";
}, 300);

// LÓGICA
let membresiaSeleccionada = null;
let validado = false;

function seleccionarMembresia(e, tipo) {

  const guardada = localStorage.getItem("membresia");
  const mensaje = document.getElementById("mensaje");
  const btn = document.getElementById("btnEntrar");

  document.querySelectorAll(".membresia-btn").forEach(btn => {
    btn.classList.remove("bg-white/20");
  });

  e.target.classList.add("bg-white/20");

  mensaje.classList.remove("hidden");
  mensaje.className = "mt-4 text-sm text-gray-300";
  mensaje.innerHTML = "Verificando membresía...";

  validado = false;
  btn.classList.add("opacity-50","cursor-not-allowed");

  setTimeout(() => {

    // PRIMERA VEZ
    if (!guardada) {
      localStorage.setItem("membresia", tipo);
      membresiaSeleccionada = tipo;
      mostrarValidacion(tipo);
      habilitarBoton();
      return;
    }

    // VALIDACIÓN
    if (guardada === tipo) {
      membresiaSeleccionada = tipo;
      mostrarValidacion(tipo);
      habilitarBoton();
    } else {
      mensaje.className = "mt-4 text-sm text-red-400";
      mensaje.innerHTML = "Esta categoría no corresponde a tu membresía";
      btn.classList.add("opacity-50","cursor-not-allowed");
    }

  }, 3000);
}

function mostrarValidacion(tipo){
  const mensaje = document.getElementById("mensaje");

  if (tipo === "basic") {
    mensaje.className = "mt-4 text-sm text-blue-400 font-semibold";
    mensaje.innerHTML = "MEMBRESÍA BASIC VALIDADA";
  }

  if (tipo === "gold") {
    mensaje.className = "mt-4 text-sm text-yellow-400 font-semibold";
    mensaje.innerHTML = "MEMBRESÍA GOLD VALIDADA";
  }

  if (tipo === "platinum") {
    mensaje.className = "mt-4 text-sm platinum-text font-semibold";
    mensaje.innerHTML = "MEMBRESÍA PLATINUM VALIDADA";
  }
}

function habilitarBoton(){
  const btn = document.getElementById("btnEntrar");
  validado = true;

  btn.classList.remove("opacity-50","cursor-not-allowed");
}

document.getElementById("btnEntrar").onclick = function(){
  if (!validado) return;
  irASocios();
};
</script>

</body>
</html>
