<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bienvenido Socio | DAM</title>

  <script src="https://cdn.tailwindcss.com"></script>

  <!-- Fuente moderna -->
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

  <!-- Estilo PLATINUM -->
  <style>
    .platinum-text {
      background: linear-gradient(
        120deg,
        #e5e5e5 0%,
        #ffffff 25%,
        #cfcfcf 50%,
        #ffffff 75%,
        #bfbfbf 100%
      );
      background-size: 200% auto;

      background-clip: text;
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;

      text-shadow:
        0 0 6px rgba(255,255,255,0.7),
        0 0 12px rgba(255,255,255,0.4);

      animation: shinePlatinum 3s linear infinite;
    }

    @keyframes shinePlatinum {
      0% { background-position: 0% center; }
      100% { background-position: 200% center; }
    }
  </style>
</head>

<body class="bg-gray-900 flex items-center justify-center min-h-screen overflow-hidden font-[Poppins]">

  <!-- Fondo -->
  <div class="absolute inset-0 bg-[url('sorteo-dia-del-niño.png')] bg-cover bg-center blur-2xl opacity-30"></div>

  <!-- Contenido -->
  <div class="relative z-10 w-full max-w-lg p-6">
    
    <!-- Botón cerrar -->
    <button onclick="irASocios()" class="absolute -top-4 -right-4 bg-[#D4AF37] text-white w-10 h-10 rounded-full flex items-center justify-center font-bold shadow-2xl hover:bg-white hover:text-[#D4AF37] transition">
      X
    </button>

    <!-- Card -->
    <div class="bg-white/10 backdrop-blur-md p-4 rounded-3xl border border-white/20 shadow-2xl text-center">
        
        <img src="sorteo-dia-del-niño.png" class="w-full rounded-2xl shadow-lg" alt="Bienvenida">

        <div class="mt-6">
            <h1 class="text-white text-2xl font-bold tracking-widest">
              BIENVENIDO SOCIO
            </h1>

            <!-- TEXTO DINÁMICO -->
            <p id="loading-text" class="text-gray-300 mt-2 text-sm uppercase tracking-wider font-medium">
              Preparando tu panel exclusivo<span id="dots"></span>
            </p>

            <!-- BARRA -->
            <div class="w-full bg-white/10 rounded-full h-1.5 mt-4 overflow-hidden">
              <div id="progress-bar" class="h-full bg-[#D4AF37] w-0 transition-all duration-300"></div>
            </div>

            <!-- VALIDACIÓN -->
            <div id="validacion" class="mt-6 opacity-0 scale-90 transition-all duration-500">

              <!-- Icono -->
              <div class="flex justify-center mb-3">
                <div class="w-14 h-14 rounded-full border-2 border-[#D4AF37] flex items-center justify-center">
                  <svg class="w-8 h-8 text-[#D4AF37]" fill="none" stroke="currentColor" stroke-width="3" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M5 13l4 4L19 7"/>
                  </svg>
                </div>
              </div>

              <p class="text-white text-sm tracking-widest font-semibold">
                VALIDANDO MEMBRESÍA ACTIVA
              </p>

              <!-- PLATINUM PRO -->
              <p class="platinum-text text-lg font-bold mt-1 tracking-wider">
                PLATINUM
              </p>

            </div>

            <!-- Botón -->
            <button onclick="irASocios()" class="mt-6 bg-[#D4AF37] text-white px-8 py-3 rounded-full font-bold hover:scale-105 transition">
                ENTRAR AHORA
            </button>
        </div>
    </div>
  </div>

  <script>
    function irASocios() {
      window.location.href = 'socios.html';
    }

    // PUNTOS ...
    let dots = "";
    setInterval(() => {
      dots = dots.length < 3 ? dots + "." : "";
      document.getElementById("dots").textContent = dots;
    }, 500);

    let progress = 0;
    const bar = document.getElementById("progress-bar");
    const texto = document.getElementById("loading-text");
    const validacion = document.getElementById("validacion");

    const interval = setInterval(() => {
      progress += Math.random() * 12;

      if (progress >= 100) {
        progress = 100;
        clearInterval(interval);

        // Cambio de mensaje
        texto.innerHTML = "Verificando acceso seguro...";

        // Mostrar validación
        setTimeout(() => {
          validacion.classList.remove("opacity-0", "scale-90");
          validacion.classList.add("opacity-100", "scale-100");
        }, 600);

        // Redirección automática
        setTimeout(() => {
          irASocios();
        }, 2000);
      }

      bar.style.width = progress + "%";
    }, 300);
  </script>

</body>
</html>
