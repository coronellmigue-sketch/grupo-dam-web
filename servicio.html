    // --- LÓGICA DE ÚLTIMO MINUTO Y FECHAS ---
function obtenerOfertasUltimoMinutoConVariaciones(cat, ofertas) {
    const LS_KEY = 'dam-ultimo-minuto-datos-' + cat;
    const ahora = Date.now();
    let data = localStorage.getItem(LS_KEY);
    let obj = null;

    try { obj = data ? JSON.parse(data) : null; } catch { obj = null; }

    // Rotación total cada 48h para precios y etiquetas
    if (!obj || !obj.ts || (ahora - obj.ts) > 1000 * 60 * 60 * 48) {
        obj = { ts: ahora, arr: [] };
        ofertas.forEach(o => {
            // Variar precio +/- 2%
            const base = parseInt(o.p.replace(/\./g, ""), 10);
            const delta = Math.round(base * (Math.random() * 0.04 - 0.02));
            const precio = (base + delta).toLocaleString('es-CO');
            
            // Lógica de Fechas Automáticas (30, 45 o 60 días después)
            let fechaActual = o.f;
            const hoy = new Date();
            let partes = fechaActual.match(/(\d{2})-(\d{2}) (\w{3})/);
            
            if (partes) {
                let dia = parseInt(partes[1], 10);
                let mesStr = partes[3];
                let meses = ['Ene','Feb','Mar','Abr','May','Jun','Jul','Ago','Sep','Oct','Nov','Dic'];
                let mesNum = meses.findIndex(m => m.toLowerCase().startsWith(mesStr.toLowerCase().slice(0,3)));
                let fechaObj = new Date(hoy.getFullYear(), mesNum, dia);

                // Si la fecha ya pasó o falta menos de 3 días, mover al futuro
                if ((fechaObj - hoy) < 1000 * 60 * 60 * 24 * 3) {
                    let diasExtra = [30, 45, 60][Math.floor(Math.random() * 3)];
                    fechaObj.setDate(fechaObj.getDate() + diasExtra);
                    let d1 = fechaObj.getDate().toString().padStart(2, '0');
                    let m1 = meses[fechaObj.getMonth()];
                    let d2 = (fechaObj.getDate() + 4).toString().padStart(2, '0');
                    fechaActual = `${d1}-${d2} ${m1}`;
                }
            }
            
            let nuevo = o.n || Math.random() < 0.2;
            obj.arr.push({ precio, fecha: fechaActual, nuevo });
        });
        localStorage.setItem(LS_KEY, JSON.stringify(obj));
    }
    return obj.arr;
}

// --- LÓGICA "SÓLO 1 UNIDAD" Y "UPS" ---
function obtenerEstadoEscasez(cat, ofertas) {
    // 1. Creamos un número que cambia cada 5 días (ej: 412, 413...)
    // Dividimos el tiempo actual por el equivalente a 5 días en milisegundos
    const periodoDe5Dias = Math.floor(Date.now() / (1000 * 60 * 60 * 24 * 5));
    
    // 2. Creamos una "semilla" única combinando el periodo con la categoría
    // Esto asegura que Nacionales e Internacionales no elijan siempre los mismos índices
    const semillaStr = `${periodoDe5Dias}_${cat}`;
    let hash = 0;
    for (let i = 0; i < semillaStr.length; i++) {
        hash = ((hash << 5) - hash) + semillaStr.charCodeAt(i);
        hash |= 0; 
    }
    const semilla = Math.abs(hash);

    // 3. Función para generar números "aleatorios" pero fijos basados en la semilla
    const pseudoRandom = (s) => {
        const x = Math.sin(s) * 10000;
        return x - Math.floor(x);
    };

    // 4. Barajamos los índices usando la semilla
    let indices = [...Array(ofertas.length).keys()];
    for (let i = indices.length - 1; i > 0; i--) {
        const j = Math.floor(pseudoRandom(semilla + i) * (i + 1));
        [indices[i], indices[j]] = [indices[j], indices[i]];
    }

    // 5. Elegimos la hora de venta también basada en la semilla
    const horas = ["8:45 AM", "10:20 AM", "1:15 PM", "2:30 PM", "4:10 PM"];
    const horaIndice = Math.floor(pseudoRandom(semilla) * horas.length);

    return {
        idxAgotado: indices[0],         // Siempre será el mismo para todos por 5 días
        idxUltimaReal: indices[1],      // Siempre será el mismo para todos por 5 días
        idxUltimaSimulada: indices[2],  // Siempre será el mismo para todos por 5 días
        fechaVenta: horas[horaIndice]
    };
}

function mostrarUps(dia, hora) {
    alert(`UPS, LO SENTIMOS...\n\nLa última unidad de este paquete fue vendida el día ${dia} a las: ${hora}.\n\nPor favor, contacta a un asesor para consultar disponibilidad en otras fechas.`);
}

// Función nueva para variar el texto "Vuelo + Hotel..."
function obtenerInclusionesDinamicas(idx) {
    const extras = ["", " + 1 Tour incluido", " + 1 Actividad a elegir", " + Actividades extras"];
    // Usamos el índice para que cada tarjeta tenga un extra distinto pero fijo
    const eleccion = idx % extras.length;
    return `Vuelo + Hotel + Desayunos${extras[eleccion]}`;
}

                // --- ROTACIÓN CADA 2 DÍAS (48h) ---
                function obtenerOfertasUltimoMinutoRotadas() {
                    // Clave persistente
                    const LS_KEY = 'dam-ultimo-minuto-rotacion';
                    const ahora = Date.now();
                    let data = localStorage.getItem(LS_KEY);
                    let obj = null;
                    try { obj = data ? JSON.parse(data) : null; } catch { obj = null; }
                    // Si no existe o pasaron más de 48h, rotar
                    if (!obj || !obj.ts || (ahora - obj.ts) > 1000 * 60 * 60 * 48) {
                        // Rotar: mezclar aleatoriamente
                        function shuffle(arr) {
                            let a = arr.slice();
                            for (let i = a.length - 1; i > 0; i--) {
                                const j = Math.floor(Math.random() * (i + 1));
                                [a[i], a[j]] = [a[j], a[i]];
                            }
                            return a;
                        }
                        obj = {
                            ts: ahora,
                            nacionales: shuffle(ofertasUltimoMinuto.nacionales),
                            internacionales: shuffle(ofertasUltimoMinuto.internacionales)
                        };
                        localStorage.setItem(LS_KEY, JSON.stringify(obj));
                    }
                    return {
                        nacionales: obj.nacionales,
                        internacionales: obj.internacionales
                    };
                }
            // --- AGOTAMIENTO DINÁMICO ---
            function calcularCuposDinamico(inicial, idPaquete, categoria) {
                // idPaquete: nombre del destino + fecha para unicidad
                // categoria: nacionales/internacionales
                const base = calcularCupos(inicial);
                // Generar semilla diaria por paquete
                const hoy = new Date();
                const dia = hoy.getDate();
                const mes = hoy.getMonth();
                const anio = hoy.getFullYear();
                // Un hash simple para variar por paquete y día
                let hash = 0;
                for (let i = 0; i < idPaquete.length; i++) hash += idPaquete.charCodeAt(i);
                hash += dia * 31 + mes * 17 + anio * 13 + (categoria === 'nacionales' ? 1 : 2);
                // Variación diaria entre -2 y 0 (solo decrementa o igual)
                const variacion = -Math.floor(Math.abs(Math.sin(hash)) * 3);
                let cupos = base + variacion;
                // Nunca menos de 0
                return cupos < 0 ? 0 : cupos;
            }
        tailwind.config = {
            theme: {
                extend: {
                    colors: { gold: '#D4AF37' },
                    fontFamily: { sans: ['Montserrat', 'sans-serif'], display: ['Playfair Display', 'serif'] },
                }
            }
        }

                    const esAgotadoGris = idx === escasez.idxAgotado;
                    const esUltimaReal = idx === escasez.idxUltimaReal;
                    const esUltimaSimulada = idx === escasez.idxUltimaSimulada;
                    
                    // Cupos: 0 si es gris, 1 si es de las últimas unidades, aleatorio el resto
                    const cupos = esAgotadoGris ? 0 : (esUltimaReal || esUltimaSimulada ? 1 : calcularCupos(o.c));
                    
                    const precio = variaciones[idx]?.precio || o.p;
                    const fecha = variaciones[idx]?.fecha || o.f;
                    const nuevo = variaciones[idx]?.nuevo || o.n;
                    const msgWA = encodeURIComponent(`Hola, soy socio DAM. Me interesa el paquete a ${o.d} por $${precio} (Fecha: ${fecha}). ¿Me confirmas disponibilidad?`);

                    // Clases de la tarjeta
                    let cardStyle = "p-8 rounded-[2.5rem] border img-glass-card relative overflow-visible transition-all duration-500 ";
                    if (esAgotadoGris) {
                        cardStyle += "border-gray-300 bg-gray-100/50 grayscale opacity-70 pointer-events-none";
                    } else if (esUltimaReal || esUltimaSimulada) {
                        cardStyle += "border-orange-300 bg-orange-50/30 hover:-translate-y-3";
                    } else {
                        cardStyle += "border-white bg-white/70 hover:-translate-y-3";
                    }

                    html += `
                    <div class="${cardStyle}">
                        ${nuevo && !esAgotadoGris ? '<span class="absolute -top-3 -right-2 bg-gold text-white text-[9px] font-bold px-4 py-1.5 rounded-full animate-blink-gold z-30 shadow-xl tracking-widest border border-white/20">OFERTA</span>' : ''}
                        
                        <h4 class="text-2xl text-neutral-900 font-display mb-2 italic font-bold tracking-tight">${o.d}</h4>
                        <p class="text-gold text-sm tracking-widest mb-4 font-bold">DESDE $${precio} COP</p>
                        
                        <div class="space-y-2 mb-6 text-sm text-neutral-600 font-medium italic leading-relaxed">
                            <p class="flex items-center gap-2">📅 <span class="text-neutral-800">Salida: ${fecha}</span></p>
                            <p class="flex items-center gap-2">✈️ <span class="text-neutral-800">${obtenerInclusionesDinamicas(idx)}</span></p>
                        </div>

                        <div class="pt-4 border-t border-black/10 flex justify-between items-center mb-6">
                            <span class="${(esUltimaReal || esUltimaSimulada) ? 'text-red-600 font-bold animate-pulse' : (esAgotadoGris ? 'text-gray-500 font-bold' : 'text-neutral-500 text-[10px]')} uppercase tracking-widest">
                                ${esAgotadoGris ? 'AGOTADO' : ((esUltimaReal || esUltimaSimulada) ? '¡ÚLTIMA UNIDAD!' : `Cupos: ${cupos}`)}
                            </span>
                            <div class="flex gap-1.5">
                                ${[1,2,3,4,5].map(i => `<div class="w-2 h-2 rounded-full ${i <= cupos ? 'bg-gold shadow-[0_0_8px_rgba(212,175,55,0.6)]' : 'bg-neutral-300'}"></div>`).join('')}
                            </div>
                        </div>

                        ${esAgotadoGris ? 
                            `<div class="flex items-center justify-center gap-3 w-full bg-gray-400 text-white text-[10px] font-bold py-4 rounded-2xl uppercase tracking-[0.2em]">NO DISPONIBLE</div>` :
                            (esUltimaSimulada ? 
                                `<button onclick="mostrarUps('${fecha}', '${escasez.fechaVenta}')" class="btn-wa-ultimo flex items-center justify-center gap-3 w-full text-white text-[10px] font-bold py-4 rounded-2xl transition-all uppercase tracking-[0.2em] shadow-xl active:scale-95">
                                    <img src="https://upload.wikimedia.org/wikipedia/commons/6/6b/WhatsApp.svg" class="h-4 w-4 brightness-200" alt="WA">
                                    CONSULTAR ASESOR
                                </button>` :
                                `<a href="https://wa.me/573115815326?text=${msgWA}" target="_blank" class="btn-wa-ultimo flex items-center justify-center gap-3 w-full text-white text-[10px] font-bold py-4 rounded-2xl hover:text-black transition-all uppercase tracking-[0.2em] shadow-xl active:scale-95">
                                    <img src="https://upload.wikimedia.org/wikipedia/commons/6/6b/WhatsApp.svg" class="h-4 w-4 brightness-200" alt="WA">
                                    CONSULTAR ASESOR
                                </a>`
                            )
                        }
                    </div>`;
                });
                html += `</div>`;
            });

            contenedor.innerHTML = html + `</div>`; // Agregué el cierre del div principal aquí
        
            // Cerramos el contenedor principal y pegamos tu tarjeta informativa
            contenedor.innerHTML = html + `
            </div>
            <div class="mt-16 flex justify-center">
                <div class="max-w-3xl w-full p-8 md:p-10 rounded-[2.5rem] 
                    bg-gray-200/60 backdrop-blur-xl 
                    border border-white/40 
                    shadow-[0_20px_60px_rgba(0,0,0,0.1)] 
                    relative overflow-hidden">
                    <div class="absolute inset-0 bg-gradient-to-br from-white/40 via-transparent to-transparent opacity-60 pointer-events-none"></div>
                    <h4 class="text-xl md:text-2xl font-display italic text-neutral-900 mb-6 tracking-tight text-center">
                        Información Importante
                    </h4>
                    <div class="space-y-4 text-sm md:text-[15px] text-neutral-700 leading-relaxed font-medium text-center">
                        <p>Valida siempre con tu asesor fechas de salida y disponibilidad.</p>
                        <p>Recuerda que al ser paquetes en <span class="text-black font-semibold">superpromo</span>, suelen agotarse mucho más rápido.</p>
                        <p>Las salidas pueden ser desde <span class="font-semibold text-black">Bogotá, Cúcuta o Bucaramanga</span>.</p>
                        <p>Las tarifas pueden variar y aplican condiciones y restricciones.</p>
                        <p class="text-black font-semibold">Contacta a tu asesor para más información.</p>
                    </div>
                </div>
            </div>`;
        }
        else if (id === "paquetes-armados") {
            const style = document.createElement('style');
            style.innerHTML = `
                @keyframes toBag {
                    0% { transform: scale(1) translate(0, 0); opacity: 1; }
                    100% { transform: scale(0.1) translate(50px, 150px); opacity: 0; }
                }
                .fly-to-bag { animation: toBag 0.6s cubic-bezier(0.4, 0, 0.2, 1) forwards; pointer-events: none; }
                .shake { animation: shake 0.4s ease-in-out; }
                @keyframes shake {
                    0%, 100% { transform: scale(1) rotate(0); }
                    25% { transform: scale(1.1) rotate(2deg); }
                    75% { transform: scale(1.1) rotate(-2deg); }
                }
                .glass-premium {
                    background: linear-gradient(145deg, rgba(255,255,255,0.05), rgba(255,255,255,0.01));
                    border: 1px solid rgba(212,175,55,0.2);
                    box-shadow: 0 8px 32px 0 rgba(0,0,0,0.8);
                    backdrop-filter: blur(8px);
                }
                .gold-gradient-text {
                    background: linear-gradient(to right, #BF953F, #FCF6BA, #B38728, #FBF5B7, #AA771C);
                    -webkit-background-clip: text;
                    -webkit-text-fill-color: transparent;
                }
                .bg-pro-gradient {
                    background: radial-gradient(circle at top right, #1a1a1a, #050505);
                }
            `;
            document.head.appendChild(style);

            const icons = {
                vuelo: `<svg class="w-7 h-7" viewBox="0 0 24 24" fill="none" stroke="#D4AF37" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M17.8 19.2L16 11l3.5-3.5C21 6 21.5 4 21 3c-1-.5-3 0-4.5 1.5L13 8 4.8 6.2c-.5-.1-.9.1-1.1.5l-.3.5c-.2.5-.1 1 .3 1.3L9 12l-2 3H4l-1 1 3 2 2 3 1-1v-3l3-2 3.5 5.3c.3.4.8.5 1.3.3l.5-.3c.4-.2.6-.7.5-1.2z"/></svg>`,
                hotel: `<svg class="w-7 h-7" viewBox="0 0 24 24" fill="none" stroke="#D4AF37" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M3 21h18M5 21V7a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2v14M9 21v-4a2 2 0 0 1 2-2h2a2 2 0 0 1 2 2v4M7 9h2m4 0h2m-8 4h2m4 0h2"/></svg>`,
                tour: `<svg class="w-7 h-7" viewBox="0 0 24 24" fill="none" stroke="#D4AF37" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><path d="M16.2 7.8l-2 2.6c-.4.5-1.1.5-1.5 0l-2.6-2.6M7.8 16.2l2.6-2c.5-.4.5-1.1 0-1.5l-2.6-2.6M16.2 16.2l-2.6-2c-.5-.4-1.1-.4-1.5 0l-2 2.6"/></svg>`,
                alim: `<svg class="w-7 h-7" viewBox="0 0 24 24" fill="none" stroke="#D4AF37" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M18 8h1a4 4 0 0 1 0 8h-1M2 8h16v9a4 4 0 0 1-4 4H6a4 4 0 0 1-4-4V8zM6 1v3M10 1v3M14 1v3"/></svg>`
            };

            contenedor.innerHTML = `
                <div class="flex flex-col items-center w-full max-w-4xl mx-auto pb-10">
                    <div class="w-full mb-10">${crearCardImagen(srv.imagenes[0])}</div>

                    <div class="bg-pro-gradient border border-white/10 p-10 rounded-[3rem] shadow-[0_20px_50px_rgba(0,0,0,0.5)] w-full text-center relative overflow-hidden">
                        <div class="absolute -top-24 -right-24 w-48 h-48 bg-gold/10 blur-[100px] rounded-full"></div>
                        
                        <h4 class="text-3xl font-black gold-gradient-text mb-1 italic tracking-tight">SIMULADOR PAQUETES</h4>
                        <p class="text-[9px] text-white/40 uppercase tracking-[0.4em] mb-10">Define tu experiencia exclusiva</p>

                        <div class="flex flex-wrap justify-center gap-3 mb-12">
                            <button onclick="setPlan('nac3')" id="btn-nac3" class="px-5 py-2 rounded-full border border-gold/40 bg-gold text-black font-bold text-[10px] shadow-[0_0_15px_rgba(212,175,55,0.2)] transition-all">NAC 3 DÍAS</button>
                            <button onclick="setPlan('nac4')" id="btn-nac4" class="px-5 py-2 rounded-full border border-gold/40 text-gold font-bold text-[10px] transition-all">NAC 4 DÍAS</button>
                            <button onclick="setPlan('inter')" id="btn-inter" class="px-5 py-2 rounded-full border border-gold/40 text-gold font-bold text-[10px] transition-all">INTERNACIONAL</button>
                        </div>

                        <div class="grid grid-cols-4 gap-4 mb-14">
                            ${['vuelo', 'hotel', 'tour', 'alim'].map((type, i) => `
                                <div onclick="addToBag(this, ${i})" class="cursor-pointer group flex flex-col items-center">
                                    <div class="w-16 h-16 glass-premium rounded-3xl flex items-center justify-center group-hover:scale-110 transition-all duration-300">
                                        ${icons[type]}
                                    </div>
                                    <p class="text-[8px] text-white/60 font-medium mt-3 uppercase tracking-tighter">${type === 'alim' ? 'Alimentacion' : type}</p>
                                </div>
                            `).join('')}
                        </div>

                        <div class="relative inline-block mb-6">
                            <div id="maleta" class="text-8xl drop-shadow-[0_10px_20px_rgba(0,0,0,0.5)]">🧳</div>
                            <div id="check-done" class="absolute -top-2 -right-2 bg-white text-black rounded-full w-7 h-7 flex items-center justify-center text-xs font-black opacity-0 scale-0 transition-all shadow-xl border-2 border-gold">✓</div>
                        </div>

                        <div class="mt-4">
                            <div class="text-4xl font-bold gold-gradient-text tracking-tighter" id="counter">$ 0</div>
                            <p class="text-[10px] text-white/30 italic mt-2 font-light">tarifas base de ejemplo bajo disponibilidad</p>
                        </div>

                        <button onclick="resetBuilder()" class="mt-8 text-[9px] text-white/20 hover:text-gold transition-colors font-bold uppercase tracking-[0.2em]">Resetear Maleta ↺</button>
                    </div>
                </div>`;

            let currentPlan = 'nac3';
            let addedItems = [false, false, false, false];
            const precios = {
                'nac3': [500000, 400000, 200000, 180000],
                'nac4': [600000, 500000, 250000, 230000],
                'inter': [1200000, 1000000, 500000, 420000]
            };

            window.setPlan = (type) => {
                currentPlan = type;
                resetBuilder();
                ['nac3', 'nac4', 'inter'].forEach(t => {
                    const btn = document.getElementById(`btn-${t}`);
                    if(t === type) {
                        btn.className = "px-5 py-2 rounded-full border border-gold/40 bg-gold text-black font-bold text-[10px] shadow-[0_0_15px_rgba(212,175,55,0.2)] transition-all";
                    } else {
                        btn.className = "px-5 py-2 rounded-full border border-gold/40 text-gold font-bold text-[10px] transition-all";
                    }
                });
            };

            window.addToBag = (el, idx) => {
                if(addedItems[idx]) return;
                addedItems[idx] = true;
                const icon = el.querySelector('div');
                icon.classList.add('fly-to-bag');
                const maleta = document.getElementById('maleta');
                setTimeout(() => {
                    maleta.classList.add('shake');
                    actualizarContador();
                    setTimeout(() => maleta.classList.remove('shake'), 400);
                }, 500);
            };

            window.actualizarContador = () => {
                let total = 0;
                addedItems.forEach((item, i) => { if(item) total += precios[currentPlan][i]; });
                document.getElementById('counter').innerText = `$ ${total.toLocaleString('es-CO')}`;
                if(!addedItems.includes(false)) {
                    document.getElementById('check-done').classList.remove('opacity-0', 'scale-0');
                    document.getElementById('check-done').classList.add('opacity-100', 'scale-100');
                }
            };

            window.resetBuilder = () => {
                addedItems = [false, false, false, false];
                document.getElementById('counter').innerText = "$ 0";
                document.getElementById('check-done').classList.add('opacity-0', 'scale-0');
                document.querySelectorAll('.fly-to-bag').forEach(el => el.classList.remove('fly-to-bag'));
            };
        }
        else if (srv.texto) {
            contenedor.innerHTML = `<div class="bg-white/5 p-10 rounded-[2.5rem] border border-gold/20 text-center max-w-2xl mt-10"><p class="text-xl text-neutral-800 font-light italic leading-relaxed font-display">${srv.texto}</p></div>`;
        } else if (srv.secciones) {
            contenedor.innerHTML = "";
            srv.secciones.forEach(sec => {
                let htmlSec = `<div class="premium-divider"></div><h3 class="text-gold font-display text-3xl mb-8 italic tracking-widest uppercase">${sec.titulo}</h3><div class="grid grid-cols-1 md:grid-cols-2 gap-10 w-full mb-16">`;
                sec.fotos.forEach(img => htmlSec += crearCardImagen(img));
                htmlSec += `</div>`;
                contenedor.innerHTML += htmlSec;
            });
        } else if (srv.imagenes) {
            let htmlGrid = `<div class="grid grid-cols-1 md:grid-cols-2 gap-10 w-full mt-10">`;
            srv.imagenes.forEach(img => htmlGrid += crearCardImagen(img));
            htmlGrid += `</div>`;
            contenedor.innerHTML = htmlGrid;
        }
    }
</script>
</body>
</html>
