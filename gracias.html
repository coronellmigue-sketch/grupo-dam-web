<!DOCTYPE html>
<html lang="es" class="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Solicitud Enviada | DAM</title>

<script src="https://cdn.tailwindcss.com"></script>

<style>

/* FONDO */
body{
    background: radial-gradient(circle at top, #1a1a1a 0%, #0a0a0a 100%);
}

/* FADE IN GENERAL */
.fade-in{
    opacity: 0;
    transform: translateY(30px);
    animation: fadeIn 1s ease forwards;
}

@keyframes fadeIn{
    to{
        opacity:1;
        transform: translateY(0);
    }
}

/* EFECTO LOGO */
.logo-glow{
    border-radius: 20px;
    overflow: hidden;
    position: relative;
    box-shadow:
        0 0 20px rgba(255,255,255,0.1),
        0 0 40px rgba(200,200,200,0.15),
        inset 0 0 10px rgba(255,255,255,0.05);
}

.logo-glow::after{
    content:"";
    position:absolute;
    top:0;
    left:-100%;
    width:100%;
    height:100%;
    background: linear-gradient(
        120deg,
        transparent,
        rgba(255,255,255,0.4),
        transparent
    );
    animation: shine 3s infinite;
}

@keyframes shine{
    0%{ left:-100%; }
    50%{ left:100%; }
    100%{ left:100%; }
}

</style>
</head>

<body class="text-white flex items-center justify-center min-h-screen px-6">

<div class="text-center max-w-xl fade-in">

    <!-- LOGO -->
    <div class="logo-glow mx-auto mb-8 w-[220px] md:w-[260px]">
        <img src="logo_dam.png" alt="Logo DAM" class="w-full object-cover">
    </div>

    <!-- TITULO -->
    <h1 class="text-3xl md:text-4xl font-bold text-white mb-4 tracking-tight">
        Solicitud enviada correctamente
    </h1>

    <!-- TEXTO -->
    <p class="text-gray-400 text-lg leading-relaxed mb-8">
        Hemos recibido la información de tus beneficiarios.  
        Nuestro equipo validará los datos y recibirás confirmación en tu correo electrónico.
    </p>

    <!-- BOTÓN -->
    <a href="socios.html"
       class="inline-block bg-gradient-to-r from-gray-200 via-white to-gray-200 text-black px-8 py-3 rounded-full font-bold uppercase tracking-widest text-sm shadow-lg hover:scale-105 transition">
        Volver al panel
    </a>

</div>

</body>
</html>
