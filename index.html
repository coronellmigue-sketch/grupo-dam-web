<!DOCTYPE html>
<html lang="es">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<meta name="description" content="Inicio - Grupo Empresarial DAM. Menú universal.">
	<title>Inicio | Grupo Empresarial DAM</title>
	<link rel="preconnect" href="https://fonts.googleapis.com">
	<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
	<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Montserrat:wght@500;600;700;800&family=Playfair+Display:wght@600;700;800&display=swap" rel="stylesheet">
	<link rel="stylesheet" href="dam-theme-v2.css">
	<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
	<script src="dam-cloud-config.js"></script>
	<script src="dam-cloud.js"></script>
	<script>
		// Redirección temporal a quienes-somos.html
		if (window.location.pathname.endsWith('index.html') || window.location.pathname === '/' || window.location.pathname === '/index.html') {
			window.location.replace('quienes-somos.html');
		}
	</script>
</head>
<body>
	<div class="page-shell">
		<header id="Header">
			<div class="container nav-bar">
				<a class="brand" href="index.html#inicio" aria-label="Grupo Empresarial DAM - Inicio">
					<img class="brand-mark" src="logo_dam.png" alt="Logo DAM">
					<div class="brand-copy">
						<strong>GRUPO EMPRESARIAL DAM</strong>
						<span>HOLDING EMPRESARIAL</span>
					</div>
				</a>

				<nav class="nav-links" aria-label="Navegación principal">
					<a href="index.html#inicio">Inicio</a>
					<a href="quienes-somos.html">Quiénes Somos</a>
					<a href="destinos.html">Destinos</a>
					<a href="conectate.html">Conéctate</a>
					<a href="index.html#alianza-busca-city">Alianza Busca City</a>
				</nav>

				<div class="nav-actions">
					<div class="dropdown" id="socios-dropdown">
						<button class="button" id="socios-trigger" type="button" aria-haspopup="true" aria-expanded="false">Sección Socios</button>
						<div class="dropdown-menu" aria-label="Submenú de socios">
							<a href="socios.html?login=1#ajustes">Ajustes</a>
							<a href="socios.html?login=1#perfil">Perfil</a>
							<a href="socios.html?login=1">Acceso Socios</a>
							<a href="socios.html?logout=1">Cerrar Sesión</a>
						</div>
					</div>
				</div>

				<button class="mobile-toggle" id="mobile-toggle" type="button" aria-label="Abrir navegación">☰</button>
			</div>
		</header>

		<main>
			<!--
				Pegar aquí TODO EL CONTENIDO PRINCIPAL DE LA PÁGINA INDEX
				Todo el HTML que agregues aquí usará automáticamente los estilos y efectos ya integrados en dam-theme-v2.css.
				Puedes incluir secciones, banners, cards, sliders, novedades, alianzas, beneficios, etc.
				Ejemplo:
				<section class="hero">...</section>
				<section class="editorial">...</section>
				<section class="feature-grid">...</section>
				<footer class="footer">...</footer>
			-->
			<section style="padding: 64px 0; text-align: center; color: #001f3f;">
				<h1>Bienvenido a Grupo Empresarial DAM</h1>
				<p>Reemplace este contenido con su página principal.</p>
			</section>
		</main>
	</div>

	<script>
	// Lógica para menú móvil y dropdown socios
	document.addEventListener('DOMContentLoaded', function () {
		var header = document.getElementById('Header');
		var mobileToggle = document.getElementById('mobile-toggle');
		var navLinks = document.querySelector('.nav-links');
		var navActions = document.querySelector('.nav-actions');
		var sociosDropdown = document.getElementById('socios-dropdown');
		var sociosTrigger = document.getElementById('socios-trigger');

		// Mobile menu toggle
		mobileToggle.addEventListener('click', function (e) {
			e.stopPropagation();
			header.classList.toggle('is-menu-open');
			if (header.classList.contains('is-menu-open')) {
				document.body.style.overflow = 'hidden';
			} else {
				document.body.style.overflow = '';
			}
		});

		// Dropdown socios
		sociosTrigger.addEventListener('click', function (e) {
			e.stopPropagation();
			sociosDropdown.classList.toggle('is-open');
			sociosTrigger.setAttribute('aria-expanded', sociosDropdown.classList.contains('is-open'));
		});
		document.addEventListener('click', function (e) {
			if (header.classList.contains('is-menu-open')) {
				var navBar = header.querySelector('.nav-bar');
				if (navBar && !navBar.contains(e.target)) {
					header.classList.remove('is-menu-open');
					document.body.style.overflow = '';
				}
			}
			if (!sociosDropdown.contains(e.target)) {
				sociosDropdown.classList.remove('is-open');
				sociosTrigger.setAttribute('aria-expanded', 'false');
			}
		});
	});
	</script>
<body>
	<script>
		// Redirección automática a quienes-somos.html como página de inicio
		if (!window.location.pathname.endsWith('quienes-somos.html')) {
			window.location.replace('quienes-somos.html');
		}
	</script>
</body>
